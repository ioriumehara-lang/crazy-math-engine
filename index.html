<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Math Puzzle: discovery & Missing</title>
    <style>
        :root { --neon-green: #00ff41; --bg-black: #0d0d0d; --panel-bg: #1a1a1a; }
        body { font-family: 'Consolas', monospace; background: var(--bg-black); color: var(--neon-green); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* ヘッダー */
        .header { padding: 20px; border-bottom: 2px solid var(--neon-green); background: var(--bg-black); }
        .controls { margin-top: 10px; }
        button { background: var(--neon-green); color: #000; border: none; padding: 10px 25px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:disabled { background: #004411; color: #008822; }

        /* メインコンテンツ（左右分割） */
        .main-layout { display: flex; flex: 1; overflow: hidden; }

        /* 左側：見つかった数式 */
        .column { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #333; }
        .column-header { padding: 10px; background: var(--panel-bg); font-weight: bold; text-align: center; border-bottom: 1px solid #333; }
        #found-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column-reverse; }

        /* 右側：ないものリスト */
        .missing-column { width: 300px; display: flex; flex-direction: column; background: #050505; }
        #missing-list { flex: 1; overflow-y: auto; padding: 10px; color: #ff4444; }

        /* 行のデザイン */
        .row { border-bottom: 1px solid #222; padding: 8px 5px; display: flex; font-size: 0.9rem; }
        .num-id { color: #fff; width: 60px; font-weight: bold; }
        .formula { flex: 1; }
        .missing-item { padding: 3px 0; border-bottom: 1px solid #200; }

        /* スクロールバー調整 */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>

<div class="header">
    <h1>MATH DISCOVERY ENGINE</h1>
    <div id="stats">Ready: 0 - 11111</div>
    <div class="controls">
        <button id="startBtn" onclick="startProcess()">START ANALYSIS</button>
    </div>
</div>

<div class="main-layout">
    <div class="column">
        <div class="column-header">FOUND FORMULAS</div>
        <div id="found-list"></div>
    </div>

    <div class="missing-column">
        <div class="column-header" style="color: #ff4444;">MISSING NUMBERS</div>
        <div id="missing-list"></div>
    </div>
</div>

<script>
let currentNum = 0;
const maxNum = 11111;
const nums = [1, 2, 3, 4, 5, 6, 7, 8, 9];
const memo = new Map();

// --- 計算エンジン ---
function getPossibleValues(arr) {
    const key = arr.join(',');
    if (memo.has(key)) return memo.get(key);
    let res = new Map();
    res.set(parseInt(arr.join('')), arr.join(''));
    for (let i = 1; i < arr.length; i++) {
        let lefts = getPossibleValues(arr.slice(0, i));
        let rights = getPossibleValues(arr.slice(i));
        for (let [lVal, lExpr] of lefts) {
            for (let [rVal, rExpr] of rights) {
                res.set(lVal + rVal, `(${lExpr}+${rExpr})`);
                res.set(lVal - rVal, `(${lExpr}-${rExpr})`);
                res.set(lVal * rVal, `(${lExpr}*${rExpr})`);
                if (rVal !== 0 && lVal % rVal === 0) res.set(lVal / rVal, `(${lExpr}/${rExpr})`);
                if (rVal > 1 && rVal < 7 && lVal < 20) {
                    let pVal = Math.pow(lVal, rVal);
                    if (pVal < 1000000) res.set(pVal, `(${lExpr}^${rExpr})`);
                }
            }
        }
    }
    memo.set(key, res);
    return res;
}

// 事前計算（全パターンをメモリに展開）
const allResults = getPossibleValues(nums);

function startProcess() {
    document.getElementById('startBtn').disabled = true;
    processNext();
}

function processNext() {
    if (currentNum > maxNum) {
        document.getElementById('stats').innerText = "ANALYSIS COMPLETE.";
        return;
    }

    const foundList = document.getElementById('found-list');
    const missingList = document.getElementById('missing-list');
    const stats = document.getElementById('stats');

    const formula = allResults.get(currentNum);

    if (formula) {
        // 左側に追加
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `<span class="num-id">${currentNum}</span><span class="formula">= ${formula}</span>`;
        foundList.appendChild(row);
    } else {
        // 右側に追加
        const item = document.createElement('div');
        item.className = 'missing-item';
        item.innerText = `No.${currentNum} - NO DATA`;
        missingList.appendChild(item);
        // 欠番が見つかったら自動でスクロール
        missingList.scrollTop = missingList.scrollHeight;
    }

    if (currentNum % 10 === 0) {
        stats.innerText = `Analyzing: ${currentNum} / ${maxNum}`;
    }

    currentNum++;
    // 描画をスムーズにするために少し待機（数値を上げるとゆっくり流れます）
    setTimeout(processNext, 1);
}
</script>

</body>
</html>
