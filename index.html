<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Sequential Logic Engine v4.7</title>
    <style>
        :root {
            --bg: #05070a;
            --panel: rgba(22, 27, 34, 0.8);
            --neon-asc: #00ff95;
            --neon-desc: #00d4ff;
            --accent: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 40px 40px;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .terminal-container {
            width: 90%;
            max-width: 900px;
            background: var(--panel);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 50px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
        }

        /* スキャンライン演出 */
        .terminal-container::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(0, 212, 255, 0.1);
            animation: scan 4s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        h1 {
            text-align: center;
            font-weight: 200;
            letter-spacing: 12px;
            margin-bottom: 50px;
            color: var(--accent);
            text-transform: uppercase;
            font-size: 1.5rem;
            opacity: 0.9;
        }

        .input-group {
            display: flex;
            justify-content: center;
            position: relative;
            margin-bottom: 60px;
        }

        input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            border-radius: 100px;
            color: #fff;
            padding: 15px 40px;
            font-size: 2rem;
            width: 240px;
            text-align: center;
            outline: none;
            transition: 0.4s;
            font-weight: 200;
        }

        input:focus {
            border-color: var(--neon-desc);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
        }

        button {
            position: absolute;
            right: calc(50% - 200px);
            background: none;
            border: 1px solid var(--neon-asc);
            color: var(--neon-asc);
            border-radius: 100px;
            width: 50px; height: 50px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button:hover {
            background: var(--neon-asc);
            color: #000;
            box-shadow: 0 0 20px var(--neon-asc);
        }

        .results-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .data-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            transition: 0.3s;
        }

        .data-card:hover {
            background: rgba(255, 255, 255, 0.04);
            transform: translateY(-5px);
        }

        .card-label {
            font-size: 0.65rem;
            letter-spacing: 3px;
            margin-bottom: 20px;
            text-transform: uppercase;
            opacity: 0.5;
        }

        .formula-output {
            font-size: 1.4rem;
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            color: #fff;
            min-height: 1.5em;
            word-break: break-all;
        }

        sup { color: var(--neon-desc); font-weight: bold; }

        #status-display {
            margin-top: 40px;
            text-align: center;
            font-size: 0.7rem;
            font-family: monospace;
            color: var(--text-dim);
            opacity: 0.4;
        }
    </style>
</head>
<body>

<div class="terminal-container">
    <h1>Sequential Core</h1>
    
    <div class="input-group">
        <input type="number" id="target" value="201186" autocomplete="off">
        <button onclick="solve()">&rarr;</button>
    </div>

    <div class="results-wrapper">
        <div class="data-card">
            <div class="card-label" style="color: var(--neon-asc)">Sequence [1-9]</div>
            <div id="asc-out" class="formula-output">--</div>
        </div>
        <div class="data-card">
            <div class="card-label" style="color: var(--neon-desc)">Sequence [9-1]</div>
            <div id="desc-out" class="formula-output">--</div>
        </div>
    </div>

    <div id="status-display">LOG: SYSTEM_IDLE // THREADS_READY</div>
</div>

<script>
const memo = new Map();

function compute(numbers) {
    const key = numbers.join(',');
    if (memo.has(key)) return memo.get(key);

    let res = new Map();
    res.set(parseInt(numbers.join('')), numbers.join(''));

    for (let i = 1; i < numbers.length; i++) {
        const lefts = compute(numbers.slice(0, i));
        const rights = compute(numbers.slice(i));

        for (const [lv, le] of lefts) {
            for (const [rv, re] of rights) {
                update(res, lv + rv, `(${le}+${re})`);
                update(res, lv - rv, `(${le}-${re})`);
                update(res, lv * rv, `(${le}*${re})`);
                if (rv !== 0 && lv % rv === 0) update(res, lv / rv, `(${le}/${re})`);

                if (rv >= 2 && rv <= 15) {
                    if ((lv >= 2 && lv <= 100) || (lv > 100 && rv <= 3)) {
                        const pv = Math.pow(lv, rv);
                        if (Number.isSafeInteger(pv) && pv > 0 && pv < 50000000) {
                            update(res, pv, `(${le}^${re})`);
                        }
                    }
                }
            }
        }
    }
    memo.set(key, res);
    return res;
}

function update(map, val, expr) {
    if (!map.has(val) || expr.length < map.get(val).length) map.set(val, expr);
}

function solve() {
    const val = parseInt(document.getElementById('target').value);
    const log = document.getElementById('status-display');
    if (isNaN(val)) return;

    log.innerText = "LOG: EXECUTING_RECURSIVE_DESCENT_SEARCH...";
    memo.clear(); 

    setTimeout(() => {
        const asc = compute([1,2,3,4,5,6,7,8,9]).get(val);
        const desc = compute([9,8,7,6,5,4,3,2,1]).get(val);

        document.getElementById('asc-out').innerHTML = format(asc);
        document.getElementById('desc-out').innerHTML = format(desc);
        log.innerText = "LOG: SEARCH_COMPLETE // RESULTS_RENDERED";
    }, 50);
}

function format(str) {
    if (!str) return '<span style="opacity:0.2">NULL</span>';
    let s = str.startsWith('(') && str.endsWith(')') ? str.slice(1, -1) : str;
    return s.replace(/\^(\d+)/g, '<sup>$1</sup>').replace(/\^(\([^)]+\))/g, '<sup>$1</sup>');
}

document.getElementById('target').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') solve();
});
</script>
</body>
</html>
