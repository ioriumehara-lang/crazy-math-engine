<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Mega-Target Solver</title>
    <style>
        :root { --neon: #00ff41; --bg: #0d0d0d; }
        body { font-family: 'Consolas', monospace; background: var(--bg); color: var(--neon); text-align: center; padding: 20px; }
        .container { background: #1a1a1a; border: 2px solid var(--neon); padding: 30px; display: inline-block; width: 90%; max-width: 800px; box-shadow: 0 0 50px rgba(0,255,65,0.1); }
        .input-group { margin: 20px 0; display: flex; justify-content: center; gap: 10px; }
        input { background: #000; border: 1px solid var(--neon); color: #fff; padding: 15px; font-size: 24px; width: 200px; outline: none; }
        button { background: var(--neon); color: #000; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; font-size: 18px; }
        #status { margin-bottom: 20px; color: #ffcc00; font-size: 0.9rem; }
        .result-panel { background: #000; border: 1px solid #333; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .formula { font-size: 1.6rem; color: #fff; word-break: break-all; min-height: 1.5em; }
        .fact { color: #ff00ff; }
    </style>
</head>
<body>

<div class="container">
    <h1>MEGA-TARGET SOLVER</h1>
    <p>123456789 or 987654321</p>
    
    <div class="input-group">
        <input type="number" id="target" value="2015719">
        <button onclick="startDeepSearch()">FAST SOLVE</button>
    </div>
    
    <div id="status">Ready.</div>

    <div class="result-panel">
        <div id="res-label" style="font-size: 0.7rem; color: #888; margin-bottom: 10px;">FOUND FORMULA</div>
        <div id="output" class="formula">--</div>
    </div>
</div>

<script>
// 階乗テーブルをグローバルに
const F = [1, 1, 2, 6, 24, 120, 720, 5040, 40320, 362880];

async function startDeepSearch() {
    const target = parseInt(document.getElementById('target').value);
    const output = document.getElementById('output');
    const status = document.getElementById('status');
    
    output.innerText = "Searching...";
    status.innerText = "Analyzing math patterns (Non-blocking)...";

    // 昇順と降順を順番に（または並列で）試す
    const modes = [
        [1, 2, 3, 4, 5, 6, 7, 8, 9],
        [9, 8, 7, 6, 5, 4, 3, 2, 1]
    ];

    let found = null;

    for (let nums of modes) {
        status.innerText = `Trying pattern: [${nums.join('')}]...`;
        found = await solve(nums, target);
        if (found) break;
    }

    output.innerHTML = found ? format(found) : "NOT FOUND (Complexity Limit Exceeded)";
    status.innerText = "Analysis Complete.";
}

async function solve(nums, target) {
    const memo = new Map();

    async function compute(arr) {
        const key = arr.join(',');
        if (memo.has(key)) return memo.get(key);

        let res = new Map();
        
        // 1. 数字の結合
        let combined = parseInt(arr.join(''));
        if (combined < 1e15) res.set(combined, arr.join(''));
        
        // 2. 階乗パーツ (1桁の時のみ)
        if (arr.length === 1 && arr[0] <= 9 && arr[0] >= 3) {
            res.set(F[arr[0]], `${arr[0]}!`);
        }

        for (let i = 1; i < arr.length; i++) {
            // 処理を細かく切ってフリーズを回避
            if (arr.length >= 8) await new Promise(resolve => setTimeout(resolve, 0));

            let lefts = await compute(arr.slice(0, i));
            let rights = await compute(arr.slice(i));

            for (let [lv, le] of lefts) {
                for (let [rv, re] of rights) {
                    // 基本演算
                    res.set(lv + rv, `(${le}+${re})`);
                    res.set(lv - rv, `(${le}-${re})`);
                    res.set(lv * rv, `(${le}*${re})`);
                    if (rv !== 0 && lv % rv === 0) res.set(lv / rv, `(${le}/${re})`);

                    // 巨大数へのブースト（累乗）
                    if (rv >= 2 && rv <= 10 && lv >= 2 && lv <= 50) {
                        let pv = Math.pow(lv, rv);
                        if (pv > 0 && pv < 1e12 && Number.isSafeInteger(pv)) {
                            res.set(pv, `(${le}^${re})`);
                        }
                    }
                }
            }
        }
        memo.set(key, res);
        return res;
    }

    const finalMap = await compute(nums);
    return finalMap.get(target);
}

function format(s) {
    return s.replace(/\^/g, '<sup>').replace(/\)/g, '</sup>)')
            .replace(/(\d+!)/g, '<span class="fact">$1</span>');
}
</script>
</body>
</html>
