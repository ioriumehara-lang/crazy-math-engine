<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Crazy Math: Human vs AI</title>
    <style>
        :root { --neon-green: #00ff41; --bg-black: #0d0d0d; --panel-bg: #1a1a1a; --error-red: #ff3333; --user-blue: #00ccff; }
        body { font-family: 'Consolas', monospace; background: var(--bg-black); color: var(--neon-green); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .header { padding: 15px 25px; border-bottom: 2px solid var(--neon-green); background: var(--bg-black); z-index: 10; }
        .controls { margin-top: 10px; display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        
        button { background: var(--neon-green); color: #000; border: none; padding: 8px 20px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #fff; }
        button:disabled { background: #004411; color: #008822; }
        
        .mode-btn { background: #333; color: #eee; border: 1px solid #444; }
        .mode-btn.active { background: var(--user-blue); color: #000; border-color: var(--user-blue); }

        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .column { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #333; }
        #found-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column-reverse; }

        .missing-column { width: 320px; display: flex; flex-direction: column; background: #080808; }
        #missing-list { flex: 1; overflow-y: auto; padding: 10px; color: var(--error-red); }

        .column-header { padding: 8px; background: var(--panel-bg); font-size: 0.8rem; font-weight: bold; text-align: center; border-bottom: 1px solid #333; letter-spacing: 1px; }

        .row { border-bottom: 1px solid #1a1a1a; padding: 6px 10px; display: flex; align-items: center; }
        .num-id { color: #fff; width: 60px; font-weight: bold; }
        .formula { flex: 1; font-size: 0.9rem; }
        .user-found { color: var(--user-blue); }

        .missing-item { padding: 5px; border-bottom: 1px solid #200; cursor: pointer; transition: 0.2s; display: flex; justify-content: space-between; }
        .missing-item:hover { background: #200; color: #fff; }
        .missing-item::after { content: '✎ Edit'; font-size: 0.7rem; opacity: 0.5; }

        #progress-bar { height: 4px; background: #004411; width: 0%; transition: width 0.1s; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0; font-size: 1.2rem;">CRAZY MATH DISCOVERY [0 - 11111]</h1>
    <div class="controls">
        <button id="startBtn" onclick="startProcess()">EXECUTE SEARCH</button>
        <button id="upBtn" class="mode-btn active" onclick="setMode('up')">ASC (1→9)</button>
        <button id="downBtn" class="mode-btn" onclick="setMode('down')">DESC (9→1)</button>
        <div id="stats">Ready</div>
    </div>
</div>
<div id="progress-bar"></div>

<div class="main-layout">
    <div class="column">
        <div class="column-header">FOUND BY AI / USER</div>
        <div id="found-list"></div>
    </div>
    <div class="missing-column">
        <div class="column-header">MISSING (CLICK TO SOLVE)</div>
        <div id="missing-list"></div>
    </div>
</div>

<script>
let currentNum = 0;
const maxNum = 11111;
let currentNums = [1, 2, 3, 4, 5, 6, 7, 8, 9];
let isRunning = false;
let userSolutions = new Map(); // ユーザーが入力した数式を保存
let allResults = new Map();

// モード切り替え
function setMode(mode) {
    if (isRunning) return;
    document.getElementById('upBtn').classList.toggle('active', mode === 'up');
    document.getElementById('downBtn').classList.toggle('active', mode === 'down');
    currentNums = (mode === 'up') ? [1,2,3,4,5,6,7,8,9] : [9,8,7,6,5,4,3,2,1];
    resetDisplay();
}

function resetDisplay() {
    currentNum = 0;
    document.getElementById('found-list').innerHTML = "";
    document.getElementById('missing-list').innerHTML = "";
    document.getElementById('progress-bar').style.width = "0%";
    document.getElementById('startBtn').disabled = false;
}

// 計算エンジン（メモ化）
const memo = new Map();
function getPossibleValues(arr) {
    const key = arr.join(',');
    if (memo.has(key)) return memo.get(key);
    let res = new Map();
    res.set(parseInt(arr.join('')), arr.join(''));
    for (let i = 1; i < arr.length; i++) {
        let lefts = getPossibleValues(arr.slice(0, i));
        let rights = getPossibleValues(arr.slice(i));
        for (let [lVal, lExpr] of lefts) {
            for (let [rVal, rExpr] of rights) {
                res.set(lVal + rVal, `(${lExpr}+${rExpr})`);
                res.set(lVal - rVal, `(${lExpr}-${rExpr})`);
                res.set(lVal * rVal, `(${lExpr}*${rExpr})`);
                if (rVal !== 0 && lVal % rVal === 0) res.set(lVal / rVal, `(${lExpr}/${rExpr})`);
                if (rVal > 1 && rVal < 7 && lVal < 20) {
                    let pVal = Math.pow(lVal, rVal);
                    if (pVal < 1000000) res.set(pVal, `(${lExpr}^${rExpr})`);
                }
            }
        }
    }
    memo.set(key, res);
    return res;
}

function startProcess() {
    isRunning = true;
    document.getElementById('startBtn').disabled = true;
    // その時のモードで事前計算
    allResults = getPossibleValues(currentNums);
    processNext();
}

function processNext() {
    if (currentNum > maxNum) {
        isRunning = false;
        document.getElementById('stats').innerText = "COMPLETE.";
        return;
    }

    const foundList = document.getElementById('found-list');
    const missingList = document.getElementById('missing-list');
    
    let formula = allResults.get(currentNum);
    let isUserFound = false;

    // AIがなくてもユーザーが投稿していたら表示
    if (!formula && userSolutions.has(currentNum)) {
        formula = userSolutions.get(currentNum);
        isUserFound = true;
    }

    if (formula) {
        const row = document.createElement('div');
        row.className = 'row' + (isUserFound ? ' user-found' : '');
        row.innerHTML = `<span class="num-id">${currentNum}</span><span class="formula">= ${formula}</span>`;
        foundList.appendChild(row);
    } else {
        const item = document.createElement('div');
        item.className = 'missing-item';
        item.id = `missing-${currentNum}`;
        item.innerText = `No.${currentNum}`;
        item.onclick = () => addUserFormula(currentNum);
        missingList.appendChild(item);
    }

    if (currentNum % 20 === 0) {
        document.getElementById('progress-bar').style.width = (currentNum / maxNum * 100) + "%";
        document.getElementById('stats').innerText = `Analyzing: ${currentNum}`;
    }

    currentNum++;
    // 11111まであるので、少し早めに設定
    currentNum < 2000 ? setTimeout(processNext, 0) : requestAnimationFrame(processNext);
}

// ユーザー投稿機能
function addUserFormula(id) {
    const input = prompt(`No.${id} の数式を入力してください：\n(例: (1+2)*3+...)`);
    if (input) {
        userSolutions.set(id, input);
        // 画面を更新（すでにリストにある場合は書き換え）
        const missingItem = document.getElementById(`missing-${id}`);
        if (missingItem) missingItem.remove();
        
        const foundList = document.getElementById('found-list');
        const row = document.createElement('div');
        row.className = 'row user-found';
        row.innerHTML = `<span class="num-id">${id}</span><span class="formula">= ${input} (User Solution)</span>`;
        foundList.appendChild(row);
    }
}
</script>

</body>
</html>
