<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Safe Ultimate Engine</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body { font-family: 'Consolas', monospace; background: var(--bg); color: var(--neon); text-align: center; padding: 20px; }
        .container { background: #111; border: 1px solid var(--neon); padding: 20px; display: inline-block; width: 90%; max-width: 700px; }
        input { background: #000; border: 1px solid var(--neon); color: #fff; padding: 10px; font-size: 20px; width: 200px; }
        button { background: var(--neon); color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #040; color: #080; }
        #log { margin-top: 20px; font-size: 0.9rem; color: #888; height: 1.2em; }
        .res-box { margin-top: 20px; background: #000; padding: 20px; border: 1px solid #333; min-height: 100px; }
        .formula { font-size: 1.5rem; color: #fff; word-break: break-all; margin-top: 10px; }
        .fact { color: #f0f; }
    </style>
</head>
<body>

<div class="container">
    <h1>DEEP SEARCH ENGINE v3.1</h1>
    <p>巨大数 2015719 への挑戦（フリーズ防止実装）</p>
    
    <input type="number" id="targetInput" value="2015719">
    <button id="solveBtn" onclick="startSafeSolve()">START SEARCH</button>
    
    <div id="log">Ready.</div>

    <div class="res-box">
        <div id="mode-label" style="font-size: 0.8rem; color: var(--neon);">RESULT</div>
        <div id="result-display" class="formula">--</div>
    </div>
</div>

<script>
// 階乗テーブル
const FACT_TABLE = [1, 1, 2, 6, 24, 120, 720, 5040, 40320, 362880, 3628800];

function startSafeSolve() {
    const target = parseInt(document.getElementById('targetInput').value);
    const btn = document.getElementById('solveBtn');
    const log = document.getElementById('log');
    const display = document.getElementById('result-display');

    btn.disabled = true;
    display.innerText = "Searching...";
    
    // 計算を非同期で実行するためのキュー
    const nums = [1, 2, 3, 4, 5, 6, 7, 8, 9];
    const memo = new Map();

    async function solveRecursive(arr) {
        const key = arr.join(',');
        if (memo.has(key)) return memo.get(key);

        let res = new Map();
        let combined = parseInt(arr.join(''));
        
        // 結合数とその階乗
        if (combined < 1e15) res.set(combined, arr.join(''));
        if (combined >= 3 && combined <= 10) {
            res.set(FACT_TABLE[combined], `${combined}!`);
        }

        for (let i = 1; i < arr.length; i++) {
            // ここで少しだけ「休憩」を入れてブラウザを固まらせない
            if (arr.length > 7) await new Promise(r => setTimeout(r, 0));
            
            let lefts = await solveRecursive(arr.slice(0, i));
            let rights = await solveRecursive(arr.slice(i));

            for (let [lv, le] of lefts) {
                for (let [rv, re] of rights) {
                    // 基本四則
                    res.set(lv + rv, `(${le}+${re})`);
                    res.set(lv - rv, `(${le}-${re})`);
                    res.set(lv * rv, `(${le}*${re})`);
                    if (rv !== 0 && lv % rv === 0) res.set(lv / rv, `(${le}/${re})`);
                    
                    // 巨大数向けの累乗（結果が大きくなりすぎないよう調整）
                    if (rv > 1 && rv < 10 && lv < 100) {
                        let pv = Math.pow(lv, rv);
                        if (Number.isSafeInteger(pv) && pv < 1e12) res.set(pv, `(${le}^${re})`);
                    }
                }
            }
            log.innerText = `Calculating patterns for [${arr.join('')}]...`;
        }
        memo.set(key, res);
        return res;
    }

    solveRecursive(nums).then(allResults => {
        const found = allResults.get(target);
        display.innerHTML = found ? format(found) : "NOT FOUND (Try DESC mode?)";
        log.innerText = "Search Complete.";
        btn.disabled = false;
    });
}

function format(s) {
    return s.replace(/\^/g, '<sup>').replace(/\)/g, '</sup>)')
            .replace(/(\d+!)/g, '<span class="fact">$1</span>');
}
</script>
</body>
</html>
