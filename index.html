<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Sequential Math Generator</title>
    <style>
        body { font-family: 'Consolas', monospace; background: #0d0d0d; color: #00ff41; padding: 20px; line-height: 1.6; }
        .header { border-bottom: 2px solid #00ff41; margin-bottom: 20px; padding-bottom: 10px; }
        .controls { margin-bottom: 20px; }
        button { background: #00ff41; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #004411; color: #008822; }
        #log-container { display: flex; flex-direction: column-reverse; /* 新しい結果を上に */ }
        .row { border-bottom: 1px solid #1a1a1a; padding: 5px 0; display: flex; justify-content: space-between; }
        .num { font-weight: bold; color: #fff; width: 80px; }
        .formula { color: #00ff41; flex-grow: 1; text-align: left; padding-left: 20px; }
        .stats { font-size: 0.8rem; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h1>SEQUENTIAL GENERATOR: 1-9</h1>
    <p>0から順番に数式を生成し、羅列します。</p>
</div>

<div class="controls">
    <button id="startBtn" onclick="startGenerating()">START GENERATING</button>
</div>

<div id="stats" class="stats">Ready to start...</div>
<div id="log-container"></div>

<script>
let currentNum = 0;
let isRunning = false;
const nums = [1, 2, 3, 4, 5, 6, 7, 8, 9];
const memo = new Map();

// --- 計算エンジン ---
function getPossibleValues(arr) {
    const key = arr.join(',');
    if (memo.has(key)) return memo.get(key);

    let res = new Map();
    let combined = parseInt(arr.join(''));
    res.set(combined, arr.join(''));

    for (let i = 1; i < arr.length; i++) {
        let lefts = getPossibleValues(arr.slice(0, i));
        let rights = getPossibleValues(arr.slice(i));

        for (let [lVal, lExpr] of lefts) {
            for (let [rVal, rExpr] of rights) {
                res.set(lVal + rVal, `(${lExpr}+${rExpr})`);
                res.set(lVal - rVal, `(${lExpr}-${rExpr})`);
                res.set(lVal * rVal, `(${lExpr}*${rExpr})`);
                if (rVal !== 0 && lVal % rVal === 0) res.set(lVal / rVal, `(${lExpr}/${rExpr})`);
                
                // 累乗制限
                if (rVal > 1 && rVal < 6 && lVal < 15) {
                    let pVal = Math.pow(lVal, rVal);
                    if (pVal < 100000) res.set(pVal, `(${lExpr}^${rExpr})`);
                }
            }
        }
    }
    memo.set(key, res);
    return res;
}

// すべての可能性を最初に一括計算（1-9の全パターンはブラウザでも数秒で終わります）
console.log("Pre-calculating all patterns...");
const allResults = getPossibleValues(nums);

function startGenerating() {
    if (isRunning) return;
    isRunning = true;
    document.getElementById('startBtn').disabled = true;
    generateNext();
}

function generateNext() {
    if (currentNum > 11111) return;

    const container = document.getElementById('log-container');
    const stats = document.getElementById('stats');
    
    const formula = allResults.get(currentNum);

    if (formula) {
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `
            <span class="num">${currentNum}</span>
            <span class="formula">= ${formula.replace(/\^/g, '<sup>').replace(/\)/g, '</sup>)') /* 簡易的な累乗表示 */}</span>
        `;
        container.appendChild(row);
    }

    stats.innerText = `Current progress: ${currentNum} / 11111`;
    currentNum++;

    // 少し待機して次の数字へ（ブラウザが固まらないように＆羅列していく様子を見せるため）
    setTimeout(generateNext, 10); 
}
</script>

</body>
</html>
