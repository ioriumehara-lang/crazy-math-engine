<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Sequential Logic Engine Pro</title>
    <style>
        :root {
            --bg: #0a0b10;
            --panel: #161b22;
            --neon-asc: #00ff95;
            --neon-desc: #00d4ff;
            --text-main: #e6edf3;
            --text-dim: #8b949e;
            --accent: #f0f6fc;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 850px;
            background: var(--panel);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        h1 {
            text-align: center;
            font-weight: 300;
            letter-spacing: 5px;
            margin-bottom: 40px;
            color: var(--accent);
        }

        .search-section {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 50px;
        }

        input {
            background: rgba(0,0,0,0.3);
            border: 2px solid #30363d;
            border-radius: 12px;
            color: #fff;
            padding: 15px;
            font-size: 1.5rem;
            width: 250px;
            text-align: center;
            outline: none;
        }

        button {
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 0 35px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .res-card {
            background: rgba(0,0,0,0.2);
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 25px;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .label {
            font-size: 0.7rem;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .formula {
            font-size: 1.2rem;
            font-family: 'Consolas', monospace;
            color: var(--accent);
            text-align: center;
            word-break: break-all;
        }

        #status-bar {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-dim);
        }

        sup { color: #ffca28; }
    </style>
</head>
<body>

<div class="container">
    <h1>Sequential Logic Pro</h1>
    
    <div class="search-section">
        <input type="number" id="target" placeholder="Target Number" autofocus>
        <button onclick="solve()">EXECUTE</button>
    </div>

    <div class="results-grid">
        <div class="res-card">
            <div class="label" style="color: var(--neon-asc)">ASCENDING 1 &rarr; 9</div>
            <div id="asc-out" class="formula">--</div>
        </div>
        <div class="res-card">
            <div class="label" style="color: var(--neon-desc)">DESCENDING 9 &rarr; 1</div>
            <div id="desc-out" class="formula">--</div>
        </div>
    </div>

    <div id="status-bar">READY // HIGH PERFORMANCE MODE</div>
</div>

<script>
const memo = new Map();

function getDeepPatterns(numbers) {
    const key = numbers.join(',');
    if (memo.has(key)) return memo.get(key);

    let res = new Map();
    res.set(parseInt(numbers.join('')), numbers.join(''));

    for (let i = 1; i < numbers.length; i++) {
        const lefts = getDeepPatterns(numbers.slice(0, i));
        const rights = getDeepPatterns(numbers.slice(i));

        for (let [lv, le] of lefts) {
            for (let [rv, re] of rights) {
                // 四則演算
                update(res, lv + rv, `(${le}+${re})`);
                update(res, lv - rv, `(${le}-${re})`);
                update(res, lv * rv, `(${le}*${re})`);
                if (rv !== 0 && lv % rv === 0) update(res, lv / rv, `(${le}/${re})`);

                // 累乗ブースト（大きな数字を作るのに必須）
                if (rv >= 2 && rv <= 10 && lv >= 2 && lv <= 100) {
                    const pv = Math.pow(lv, rv);
                    if (Number.isSafeInteger(pv) && pv < 10000000) {
                        update(res, pv, `(${le}^${re})`);
                    }
                }
            }
        }
    }
    memo.set(key, res);
    return res;
}

function update(map, val, expr) {
    if (!map.has(val) || expr.length < map.get(val).length) {
        map.set(val, expr);
    }
}

function solve() {
    const val = parseInt(document.getElementById('target').value);
    const status = document.getElementById('status-bar');
    if (isNaN(val)) return;

    status.innerText = "PROCESSING COMPLEX COMBINATIONS...";
    
    setTimeout(() => {
        const ascMap = getDeepPatterns([1,2,3,4,5,6,7,8,9]);
        const descMap = getDeepPatterns([9,8,7,6,5,4,3,2,1]);

        document.getElementById('asc-out').innerHTML = format(ascMap.get(val));
        document.getElementById('desc-out').innerHTML = format(descMap.get(val));
        status.innerText = "COMPLETE.";
    }, 50);
}

function format(str) {
    if (!str) return '<span style="color:#444">NOT FOUND</span>';
    let s = str;
    if (s.startsWith('(') && s.endsWith(')')) s = s.substring(1, s.length - 1);
    return s.replace(/\^(\d+)/g, '<sup>$1</sup>').replace(/\^(\([^)]+\))/g, '<sup>$1</sup>');
}

document.getElementById('target').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') solve();
});
</script>
</body>
</html>
