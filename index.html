<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Sequential Logic Engine v4.6</title>
    <style>
        :root {
            --bg: #0a0b10;
            --panel: #161b22;
            --neon-asc: #00ff95;
            --neon-desc: #00d4ff;
            --text-main: #e6edf3;
            --accent: #f0f6fc;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 850px;
            background: var(--panel);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        h1 {
            text-align: center;
            font-weight: 300;
            letter-spacing: 5px;
            margin-bottom: 40px;
            color: var(--accent);
            text-transform: uppercase;
        }

        .search-section {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 50px;
        }

        input {
            background: rgba(0,0,0,0.3);
            border: 2px solid #30363d;
            border-radius: 12px;
            color: #fff;
            padding: 15px;
            font-size: 1.5rem;
            width: 280px;
            text-align: center;
            outline: none;
        }

        button {
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 0 35px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background: #fff; transform: translateY(-2px); }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .res-card {
            background: rgba(0,0,0,0.2);
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 25px;
            min-height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .label {
            font-size: 0.7rem;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .formula {
            font-size: 1.3rem;
            font-family: 'Consolas', monospace;
            color: var(--accent);
            text-align: center;
            word-break: break-all;
            line-height: 1.6;
        }

        sup { color: #ffca28; font-weight: bold; }
        #status-bar { position: absolute; bottom: 20px; width: 100%; left: 0; text-align: center; font-size: 0.7rem; color: #8b949e; }
    </style>
</head>
<body>

<div class="container">
    <h1>Logic Engine v4.6</h1>
    
    <div class="search-section">
        <input type="number" id="target" value="201186" autofocus>
        <button onclick="solve()">SOLVE</button>
    </div>

    <div class="results-grid">
        <div class="res-card">
            <div class="label" style="color: var(--neon-asc)">Ascending 1 &rarr; 9</div>
            <div id="asc-out" class="formula">--</div>
        </div>
        <div class="res-card">
            <div class="label" style="color: var(--neon-desc)">Descending 9 &rarr; 1</div>
            <div id="desc-out" class="formula">--</div>
        </div>
    </div>

    <div id="status-bar">READY // ULTRA POWER SEARCH MODE</div>
</div>

<script>
const memo = new Map();

function getPowerPatterns(numbers) {
    const key = numbers.join(',');
    if (memo.has(key)) return memo.get(key);

    let res = new Map();
    const combined = parseInt(numbers.join(''));
    if (!isNaN(combined)) {
        res.set(combined, numbers.join(''));
    }

    for (let i = 1; i < numbers.length; i++) {
        const lefts = getPowerPatterns(numbers.slice(0, i));
        const rights = getPowerPatterns(numbers.slice(i));

        for (const [lv, le] of lefts) {
            for (const [rv, re] of rights) {
                // 四則演算
                update(res, lv + rv, `(${le}+${re})`);
                update(res, lv - rv, `(${le}-${re})`);
                update(res, lv * rv, `(${le}*${re})`);
                if (rv !== 0 && lv % rv === 0) update(res, lv / rv, `(${le}/${re})`);

                // 累乗ブースト：底と指数のバランスを最適化
                // 201186などの巨大数に対応するため、計算範囲を調整
                if (rv >= 2 && rv <= 15) {
                    if ((lv >= 2 && lv <= 100) || (lv > 100 && rv <= 3)) {
                        try {
                            const pv = Math.pow(lv, rv);
                            if (Number.isSafeInteger(pv) && pv > 0 && pv < 50000000) {
                                update(res, pv, `(${le}^${re})`);
                            }
                        } catch(e) {}
                    }
                }
            }
        }
    }
    memo.set(key, res);
    return res;
}

function update(map, val, expr) {
    if (!map.has(val) || expr.length < map.get(val).length) {
        map.set(val, expr);
    }
}

function solve() {
    const val = parseInt(document.getElementById('target').value);
    const status = document.getElementById('status-bar');
    if (isNaN(val)) return;

    status.innerText = "SCANNING POWER RADIX PATTERNS...";
    memo.clear(); 

    setTimeout(() => {
        const ascMap = getPowerPatterns([1,2,3,4,5,6,7,8,9]);
        const descMap = getPowerPatterns([9,8,7,6,5,4,3,2,1]);

        document.getElementById('asc-out').innerHTML = format(ascMap.get(val));
        document.getElementById('desc-out').innerHTML = format(descMap.get(val));
        status.innerText = "CALCULATION COMPLETE.";
    }, 50);
}

function format(str) {
    if (!str) return '<span style="color:#444">NOT REACHABLE</span>';
    let s = str;
    if (s.startsWith('(') && s.endsWith(')')) s = s.substring(1, s.length - 1);
    // 累乗の表示を綺麗にする
    return s.replace(/\^(\d+)/g, '<sup>$1</sup>')
            .replace(/\^(\([^)]+\))/g, '<sup>$1</sup>');
}

document.getElementById('target').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') solve();
});
</script>
</body>
</html>
