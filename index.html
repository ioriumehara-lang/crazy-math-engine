<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>The Sequential Logic Engine</title>
    <style>
        :root { --neon-green: #00ff41; --bg-black: #0a0a0a; --accent-blue: #00d4ff; }
        body { font-family: 'Consolas', monospace; background: var(--bg-black); color: var(--neon-green); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding-top: 50px; }
        
        .container { background: #111; border: 1px solid var(--neon-green); padding: 40px; border-radius: 5px; box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); width: 90%; max-width: 600px; text-align: center; }
        h1 { font-size: 1.5rem; letter-spacing: 3px; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .input-box { margin-bottom: 30px; }
        input { background: #000; border: 1px solid var(--neon-green); color: #fff; padding: 15px; font-size: 24px; width: 150px; text-align: center; outline: none; }
        button { background: var(--neon-green); color: #000; border: none; padding: 15px 30px; font-size: 18px; cursor: pointer; font-weight: bold; margin-left: 10px; transition: 0.2s; }
        button:hover { background: #fff; transform: scale(1.05); }

        .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .res-card { background: #000; border: 1px solid #333; padding: 20px; border-radius: 4px; min-height: 100px; }
        .res-card h3 { margin-top: 0; font-size: 0.8rem; color: #888; text-transform: uppercase; }
        .formula { font-size: 1.2rem; color: #fff; word-break: break-all; margin-top: 10px; }
        .not-found { color: #ff4444; font-size: 0.9rem; }
        
        #loading { display: none; margin: 20px; font-style: italic; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="container">
    <h1>SEQUENTIAL LOGIC ENGINE</h1>
    
    <div class="input-box">
        <input type="number" id="targetNum" placeholder="10000" min="0" max="11111">
        <button onclick="runSearch()">SOLVE</button>
    </div>

    <div id="loading">PROCESSING ALGORITHMS...</div>

    <div class="results-grid">
        <div class="res-card">
            <h3>ASCENDING (1→9)</h3>
            <div id="asc-res" class="formula">--</div>
        </div>
        <div class="res-card">
            <h3>DESCENDING (9→1)</h3>
            <div id="desc-res" class="formula">--</div>
        </div>
    </div>
</div>

<script>
const memo = new Map();

function getPossibleValues(arr) {
    const key = arr.join(',');
    if (memo.has(key)) return memo.get(key);

    let res = new Map();
    res.set(parseInt(arr.join('')), arr.join(''));

    for (let i = 1; i < arr.length; i++) {
        let lefts = getPossibleValues(arr.slice(0, i));
        let rights = getPossibleValues(arr.slice(i));

        for (let [lVal, lExpr] of lefts) {
            for (let [rVal, rExpr] of rights) {
                res.set(lVal + rVal, `(${lExpr}+${rExpr})`);
                res.set(lVal - rVal, `(${lExpr}-${rExpr})`);
                res.set(lVal * rVal, `(${lExpr}*${rExpr})`);
                if (rVal !== 0 && lVal % rVal === 0) res.set(lVal / rVal, `(${lExpr}/${rExpr})`);
                
                if (rVal > 1 && rVal < 7 && lVal < 20) {
                    let pVal = Math.pow(lVal, rVal);
                    if (pVal < 1000000) res.set(pVal, `(${lExpr}^${rExpr})`);
                }
            }
        }
    }
    memo.set(key, res);
    return res;
}

function runSearch() {
    const target = parseInt(document.getElementById('targetNum').value);
    const loading = document.getElementById('loading');
    const ascDisp = document.getElementById('asc-res');
    const descDisp = document.getElementById('desc-res');

    if (isNaN(target)) return;

    loading.style.display = "block";
    ascDisp.innerText = "--";
    descDisp.innerText = "--";

    // ブラウザのフリーズを防ぐためにsetTimeoutを使用
    setTimeout(() => {
        // 1-9の計算
        const ascMap = getPossibleValues([1,2,3,4,5,6,7,8,9]);
        const ascResult = ascMap.get(target);
        ascDisp.innerHTML = ascResult ? clean(ascResult) : '<span class="not-found">NO SOLUTION</span>';

        // 9-1の計算
        const descMap = getPossibleValues([9,8,7,6,5,4,3,2,1]);
        const descResult = descMap.get(target);
        descDisp.innerHTML = descResult ? clean(descResult) : '<span class="not-found">NO SOLUTION</span>';

        loading.style.display = "none";
    }, 100);
}

function clean(str) {
    // 一番外側のカッコを削除し、^を表示用に調整
    let s = str;
    if (s.startsWith('(') && s.endsWith(')')) s = s.substring(1, s.length - 1);
    return s.replace(/\^/g, '<sup>').replace(/\)/g, '</sup>)');
}
</script>

</body>
</html>
